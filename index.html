<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Christal Nairobi Dishes</title>
  <link rel="stylesheet" href="style.css" />

  <!-- icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
  />
</head>
<body>

  <div class="page-bg"></div>

  <main class="wrapper">

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-left">
        <a href="#">RECIPES</a>
        <a href="#">FORUM</a>
        <a href="#">ABOUT</a>
        <a href="#">CONTACT</a>
      </div>

      <div class="logo">Christal Nairobi  Dishes</div>

      <div class="nav-right">
        <i class="fa-regular fa-bookmark"></i>
        <i class="fa-regular fa-user"></i>
        <button>SUBSCRIBE</button>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-left">
        <h1>Easy Home<br>Cooking</h1>
        <p>Over 200+ Receipts</p>
        <a href="#">JOIN US</a>
      </div>

      <div class="hero-right">
        <!-- replace image -->
        <img src="images/pexels-anna-pyshniuk-2453945-7855282.jpg" alt="">
      </div>
    </section>

    <!-- floating socials -->
    <div class="socials">
      <i class="fa-brands fa-instagram"></i>
      <i class="fa-brands fa-youtube"></i>
      <i class="fa-brands fa-snapchat"></i>
      <i class="fa-brands fa-tiktok"></i>
      <i class="fa-brands fa-facebook-f"></i>
    </div>

    <!-- CATEGORIES -->
    <section class="categories">
      <div class="cat">
        <span>⚡</span>
        <p>POPULAR</p>
      </div>

      <div class="cat">
        <span>🍰</span>
        <p>SWEETS</p>
      </div>

      <div class="cat active">
        <span>🍳</span>
        <p>BREAKFAST</p>
      </div>

      <div class="cat">
        <span>🍩</span>
        <p>CHOCOLATE</p>
      </div>

      <div class="cat">
        <span>🥗</span>
        <p>GREENS</p>
      </div>

      <div class="cat">
        <span>🍜</span>
        <p>LUNCH</p>
      </div>

      <div class="cat">
        <span>🍖</span>
        <p>MEAT</p>
      </div>
    </section>

    <!-- RECIPES -->
    <section class="recipes">
      <div class="title-row">
        <h2>Latest Recipes</h2>
        <div class="arrows">
          <i class="fa-solid fa-arrow-left"></i>
          <i class="fa-solid fa-arrow-right"></i>
        </div>
      </div>

      <div class="recipe-grid">
        <div class="card">
          <img src="images/pexels-tamanna-rumee-52377920-7986467.jpg" alt="">
          <i class="fa-regular fa-bookmark save"></i>
        </div>

        <div class="card">
          <img src="images/pexels-prabal-9609847.jpg" alt="">
          <i class="fa-regular fa-bookmark save"></i>
        </div>

        <div class="card">
          <img src="images/pexels-iara-melo-558346607-30635681.jpg" alt="">
          <i class="fa-regular fa-bookmark save"></i>
        </div>

        <div class="card">
          <img src="images/pexels-iara-melo-558346607-30635681.jpg" alt="">
          <i class="fa-regular fa-bookmark save"></i>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
